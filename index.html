<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AABB</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #f7f6f3;
      --black: #0e0e0e;
      --mid: #a0a09a;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--black);
    }

    /* ── FULLSCREEN SLIDESHOW ── */
    .slideshow {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .slide.active { opacity: 1; }

    /* subtle dark overlay for text legibility */
    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
    }

    /* ── FIXED UI ── */
    .ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Header row */
    .ui-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .notice {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--white);
      line-height: 1.4;
      max-width: 340px;
    }

    .header-address {
      font-size: 11px;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.7);
      text-align: right;
      line-height: 1.7;
    }

    /* Footer row */
    .ui-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .footer-left {
      display: flex;
      gap: 32px;
      pointer-events: auto;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .meta-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .meta-value {
      font-size: 12px;
      color: var(--white);
    }

    .meta-value a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.4);
      padding-bottom: 1px;
      transition: opacity 0.2s;
    }
    .meta-value a:hover { opacity: 0.6; }

    /* Counter */
    .counter {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.45);
    }

    /* Click zones — left half prev, right half next */
    .click-prev, .click-next {
      position: fixed;
      top: 0;
      height: 100%;
      width: 50%;
      z-index: 5;
      cursor: w-resize;
    }
    .click-prev { left: 0; cursor: w-resize; }
    .click-next { right: 0; cursor: e-resize; }

    /* Fade in on load */
    .ui { opacity: 0; animation: fadeIn 1s 0.3s forwards; }
    @keyframes fadeIn { to { opacity: 1; } }

    /* Mobile */
    @media (max-width: 600px) {
      .ui { padding: 24px; }
      .header-address { display: none; }
      .notice { font-size: 12px; }
    }
  </style>
</head>
<body>

  <!-- SLIDESHOW -->
  <div class="slideshow" id="slideshow"></div>

  <!-- CLICK ZONES -->
  <div class="click-prev" id="clickPrev"></div>
  <div class="click-next" id="clickNext"></div>

  <!-- FIXED UI -->
  <div class="ui">
    <div class="ui-header">
      <div class="notice">
        Our website is now under construction.<br>
        See you in May.
      </div>
      <div class="header-address">
        5F, 10, Wausanro21gil, Mapogu<br>
        Seoul, KR 05544
      </div>
    </div>

    <div class="ui-footer">
      <div class="footer-left">
        <div class="meta-item">
          <span class="meta-label">Instagram</span>
          <span class="meta-value"><a href="https://instagram.com/aabb.inc" target="_blank">@aabb.inc</a></span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Email</span>
          <span class="meta-value"><a href="mailto:aabb@aabb.kr">aabb@aabb.kr</a></span>
        </div>
      </div>
      <div class="counter" id="counter">1 / 7</div>
    </div>
  </div>

  <script>
    // ── IMAGE SOURCES ──
    // 이미지를 /images/ 폴더에 올린 후 파일명만 바꾸면 됩니다.
    // 현재는 구글 드라이브 thumbnail URL 사용 (서버 업로드 시 교체)
    const images = [
      'https://drive.google.com/thumbnail?id=12n_S7KdXddqOY2Iy7Xt7XpEd-Bgnh1aF&sz=w1920',
      'https://drive.google.com/thumbnail?id=1qy-uFJqQFVnFFzPA6WHaSvPn5rdyXUjM&sz=w1920',
      'https://drive.google.com/thumbnail?id=1GUF68NgqS5a8ufg6P0Re4xFXJYrFyRSi&sz=w1920',
      'https://drive.google.com/thumbnail?id=11JlNaHtGw9WVg92b1pvoqIBvKB9mbsSw&sz=w1920',
      'https://drive.google.com/thumbnail?id=1nljVHHXPw1AhYK2bkqqyD_O362d-w9V1&sz=w1920',
      'https://drive.google.com/thumbnail?id=1nQk5bLKtc0Rh3sBKXxIFRDlxOUqq4OJU&sz=w1920',
      'https://drive.google.com/thumbnail?id=17yjATAQu_Atjaf-eKDUCdVHkSVPVOfad&sz=w1920',
    ];

    const slideshow = document.getElementById('slideshow');
    const counter   = document.getElementById('counter');
    const total     = images.length;
    let current     = 0;
    let timer;

    // Build slides
    const slides = images.map((src, i) => {
      const el = document.createElement('div');
      el.className = 'slide' + (i === 0 ? ' active' : '');
      el.style.backgroundImage = `url('${src}')`;
      slideshow.appendChild(el);
      return el;
    });

    function goTo(idx) {
      slides[current].classList.remove('active');
      current = (idx + total) % total;
      slides[current].classList.add('active');
      counter.textContent = `${current + 1} / ${total}`;
      resetTimer();
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    function resetTimer() {
      clearInterval(timer);
      timer = setInterval(next, 4000);
    }

    // Click zones
    document.getElementById('clickNext').addEventListener('click', next);
    document.getElementById('clickPrev').addEventListener('click', prev);

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft')  prev();
      if (e.key === 'ArrowRight') next();
    });

    // Auto-advance
    resetTimer();
  </script>

</body>
</html>
