<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AABB</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #f7f6f3;
      --black: #0e0e0e;
      --mid: #a0a09a;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--black);
    }

    /* ── SCROLL CONTAINER ── */
    .scroll-x {
      width: 100vw;
      height: 100vh;
      overflow-x: scroll;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
    }
    .scroll-x::-webkit-scrollbar { display: none; }

    /* ── TRACK ── */
    .track {
      display: flex;
      height: 100vh;
      /* panel 1 (white) + N image panels */
    }

    /* ── PANEL BASE ── */
    .panel {
      flex: 0 0 100vw;
      width: 100vw;
      height: 100vh;
      position: relative;
      scroll-snap-align: start;
    }

    /* ── PANEL 1: WHITE ── */
    .panel-intro {
      background: var(--white);
      transition: background 0.5s ease;
    }

    /* ── IMAGE PANELS ── */
    .panel-img {
      background-size: cover;
      background-position: center;
      background-color: #1a1a1a;
    }

    /* Placeholder shimmer for image panels */
    .panel-img .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, #1e1e1e 30%, #2a2a2a 50%, #1e1e1e 70%);
      background-size: 200% 100%;
      animation: shimmer 2.4s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .panel-img .img-label {
      position: absolute;
      bottom: 40px;
      left: 40px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    /* Dark overlay so text stays readable */
    .panel-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.18);
      pointer-events: none;
    }

    /* ── FIXED OVERLAY (sits above everything) ── */
    .fixed-ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    /* Header */
    .ui-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 32px 40px;
    }

    .logo {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--black);
      transition: color 0.5s ease;
    }

    .header-address {
      font-size: 11px;
      letter-spacing: 0.02em;
      color: var(--black);
      text-align: right;
      line-height: 1.7;
      transition: color 0.5s ease;
    }

    /* Hero text — bottom left */
    .ui-hero {
      position: absolute;
      bottom: 60px;
      left: 40px;
      max-width: 880px;
      pointer-events: auto;
      cursor: default;
    }

    .hero-line {
      display: block;
      font-size: clamp(36px, 6vw, 88px);
      font-weight: 400;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--black);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: color 0.5s ease;
    }

    .hero-line:nth-child(1) { animation-delay: 0.1s; }
    .hero-line:nth-child(2) { animation-delay: 0.22s; }
    .hero-line:nth-child(3) { animation-delay: 0.34s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hover invert — white panel state */
    .ui-hero:hover .hero-line { color: var(--white); }

    /* Meta */
    .ui-meta {
      position: absolute;
      bottom: 60px;
      right: 40px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .meta-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      transition: color 0.5s ease;
    }

    .meta-value {
      font-size: 13px;
      color: var(--black);
      transition: color 0.5s ease;
      pointer-events: auto;
    }

    .meta-value a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      padding-bottom: 1px;
      transition: opacity 0.2s;
    }
    .meta-value a:hover { opacity: 0.5; }



    body.on-white .logo          { color: var(--black); }
    body.on-white .header-address { color: var(--black); }
    body.on-white .meta-value     { color: var(--black); }

    /* Image panel */
    body.on-image .logo           { color: var(--white); }
    body.on-image .header-address  { color: var(--white); }
    body.on-image .hero-line       { color: var(--white); }
    body.on-image .meta-label      { color: rgba(255,255,255,0.45); }
    body.on-image .meta-value      { color: var(--white); }

    /* Hover invert (only meaningful on white panel) */
    body.on-white .ui-hero:hover ~ * { color: var(--white); }
    body.on-white.hero-hovered .logo           { color: var(--white); }
    body.on-white.hero-hovered .header-address  { color: var(--white); }
    body.on-white.hero-hovered .meta-label      { color: rgba(255,255,255,0.4); }
    body.on-white.hero-hovered .meta-value      { color: var(--white); }
    body.on-white.hero-hovered .panel-intro     { background: var(--black); }
    body.on-white.hero-hovered .ui-scroll-hint  { color: rgba(255,255,255,0.4); }

    /* Panel intro bg transition on hover */
    .panel-intro {
      transition: background 0.5s ease;
    }

    /* Scroll dots */
    .ui-dots {
      position: absolute;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      gap: 8px;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--mid);
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
      pointer-events: auto;
    }

    .dot.active {
      background: var(--black);
      transform: scale(1.5);
    }

    body.on-image .dot { background: rgba(255,255,255,0.35); }
    body.on-image .dot.active { background: var(--white); }
  </style>
</head>
<body class="on-white">

  <!-- HORIZONTAL SCROLL TRACK -->
  <div class="scroll-x" id="scrollX">
    <div class="track" id="track">

      <!-- Panel 1: White intro -->
      <div class="panel panel-intro" id="panel-0"></div>

      <!-- Panels 2–8: Project images from Google Drive -->
      <div class="panel panel-img" id="panel-1" style="background-image:url('https://drive.google.com/thumbnail?id=12n_S7KdXddqOY2Iy7Xt7XpEd-Bgnh1aF&sz=w1920')"><span class="img-label">Project 01</span></div>
      <div class="panel panel-img" id="panel-2" style="background-image:url('https://drive.google.com/thumbnail?id=1qy-uFJqQFVnFFzPA6WHaSvPn5rdyXUjM&sz=w1920')"><span class="img-label">Project 02</span></div>
      <div class="panel panel-img" id="panel-3" style="background-image:url('https://drive.google.com/thumbnail?id=1GUF68NgqS5a8ufg6P0Re4xFXJYrFyRSi&sz=w1920')"><span class="img-label">Project 03</span></div>
      <div class="panel panel-img" id="panel-4" style="background-image:url('https://drive.google.com/thumbnail?id=11JlNaHtGw9WVg92b1pvoqIBvKB9mbsSw&sz=w1920')"><span class="img-label">Project 04</span></div>
      <div class="panel panel-img" id="panel-5" style="background-image:url('https://drive.google.com/thumbnail?id=1nljVHHXPw1AhYK2bkqqyD_O362d-w9V1&sz=w1920')"><span class="img-label">Project 05</span></div>
      <div class="panel panel-img" id="panel-6" style="background-image:url('https://drive.google.com/thumbnail?id=1nQk5bLKtc0Rh3sBKXxIFRDlxOUqq4OJU&sz=w1920')"><span class="img-label">Project 06</span></div>
      <div class="panel panel-img" id="panel-7" style="background-image:url('https://drive.google.com/thumbnail?id=17yjATAQu_Atjaf-eKDUCdVHkSVPVOfad&sz=w1920')"><span class="img-label">Project 07</span></div>

    </div>
  </div>

  <!-- FIXED UI OVERLAY -->
  <div class="fixed-ui">
    <div class="ui-header">
      <span class="logo">AABB</span>
      <div class="header-address">
        5F, 10, Wausanro21gil, Mapogu<br>
        Seoul, KR 05544
      </div>
    </div>

    <div class="ui-hero" id="heroText">
      <span class="hero-line">Our website is</span>
      <span class="hero-line">now under construction.</span>
      <span class="hero-line">See you in May.</span>
    </div>

    <div class="ui-meta">
      <div class="meta-item">
        <span class="meta-label">Instagram</span>
        <span class="meta-value"><a href="https://instagram.com/aabb.inc" target="_blank">@aabb.inc</a></span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Email</span>
        <span class="meta-value"><a href="mailto:aabb@aabb.kr">aabb@aabb.kr</a></span>
      </div>
    </div>

    <div class="ui-dots" id="dots"></div>
  </div>

  <script>
    const scrollX    = document.getElementById('scrollX');
    const heroText   = document.getElementById('heroText');
    const dotsEl     = document.getElementById('dots');
    const panelIntro = document.getElementById('panel-0');
    const totalPanels = 8;

    // Build dots
    for (let i = 0; i < totalPanels; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.addEventListener('click', () => {
        scrollX.scrollTo({ left: i * window.innerWidth, behavior: 'smooth' });
      });
      dotsEl.appendChild(d);
    }

    const dots = document.querySelectorAll('.dot');
    let currentPanel = 0;

    function goToPanel(idx, animate = true) {
      currentPanel = idx;
      scrollX.scrollTo({ left: idx * window.innerWidth, behavior: animate ? 'smooth' : 'instant' });
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
      if (idx === 0) {
        document.body.classList.remove('on-image');
        document.body.classList.add('on-white');
      } else {
        document.body.classList.remove('on-white', 'hero-hovered');
        document.body.classList.add('on-image');
        panelIntro.style.background = '';
      }
    }

    scrollX.addEventListener('scroll', () => {
      const idx = Math.round(scrollX.scrollLeft / window.innerWidth);
      if (idx === currentPanel) return;
      currentPanel = idx;
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
      if (idx === 0) {
        document.body.classList.remove('on-image');
        document.body.classList.add('on-white');
      } else {
        document.body.classList.remove('on-white', 'hero-hovered');
        document.body.classList.add('on-image');
        panelIntro.style.background = '';
      }
    });

    // Wheel → horizontal, with loop at edges
    let wheelLocked = false;
    scrollX.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (wheelLocked) return;

      const delta = e.deltaY + e.deltaX;
      const atEnd   = currentPanel === totalPanels - 1 && delta > 30;
      const atStart = currentPanel === 0 && delta < -30;

      if (atEnd) {
        wheelLocked = true;
        goToPanel(0);
        setTimeout(() => { wheelLocked = false; }, 800);
      } else if (atStart) {
        wheelLocked = true;
        goToPanel(totalPanels - 1);
        setTimeout(() => { wheelLocked = false; }, 800);
      } else {
        scrollX.scrollLeft += delta;
      }
    }, { passive: false });

    // Hero hover invert (only on white panel)
    heroText.addEventListener('mouseenter', () => {
      if (currentPanel === 0) {
        document.body.classList.add('hero-hovered');
        panelIntro.style.background = 'var(--black)';
      }
    });
    heroText.addEventListener('mouseleave', () => {
      document.body.classList.remove('hero-hovered');
      panelIntro.style.background = '';
    });
  </script>
</body>
</html>
