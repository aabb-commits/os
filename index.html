<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AABB</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #f7f6f3;
      --black: #0e0e0e;
      --mid: #a0a09a;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── PAGE ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 32px 40px;
      background: var(--white);
      transition: background 0.5s ease;
    }

    .page.inverted {
      background: var(--black);
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .logo {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--black);
      transition: color 0.5s ease;
    }

    .header-address {
      font-size: 11px;
      letter-spacing: 0.02em;
      color: var(--black);
      text-align: right;
      line-height: 1.7;
      transition: color 0.5s ease;
    }

    .page.inverted .logo,
    .page.inverted .header-address {
      color: var(--white);
    }

    /* ── CENTER ── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 0;
    }

    /* ── HERO TEXT ── */
    .hero-text {
      cursor: default;
      text-align: center;
    }

    .hero-line {
      display: block;
      font-size: clamp(36px, 6vw, 88px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--black);
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: color 0.5s ease;
    }

    .hero-line:nth-child(1) { animation-delay: 0.1s; }
    .hero-line:nth-child(2) { animation-delay: 0.22s; }
    .hero-line:nth-child(3) { animation-delay: 0.34s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .page.inverted .hero-line { color: var(--white); }

    /* ── IMAGE SLIDER BOX ── */
    .slider-wrap {
      width: 560px;
      max-width: 90vw;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
      position: relative;
    }

    .slider-wrap.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .slider-box {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      position: relative;
      background: #111;
    }

    .slides {
      display: flex;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .slide {
      flex: 0 0 100%;
      height: 100%;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Arrow buttons */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 12px;
      z-index: 10;
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      transition: color 0.2s;
      line-height: 1;
    }

    .arrow:hover { color: #fff; }
    .arrow-prev { left: 8px; }
    .arrow-next { right: 8px; }

    /* Dots */
    .slider-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
    }

    .sdot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
    }

    .sdot.active {
      background: var(--white);
      transform: scale(1.5);
    }

    /* ── FOOTER ── */
    .footer {
      display: flex;
      justify-content: flex-start;
      gap: 32px;
      opacity: 0;
      animation: fadeUp 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .meta-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      transition: color 0.5s ease;
    }

    .meta-value {
      font-size: 13px;
      color: var(--black);
      transition: color 0.5s ease;
    }

    .meta-value a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      padding-bottom: 1px;
      transition: opacity 0.2s;
    }
    .meta-value a:hover { opacity: 0.5; }

    .page.inverted .meta-label { color: rgba(255,255,255,0.4); }
    .page.inverted .meta-value { color: var(--white); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .page { padding: 24px; }
      .header-address { display: none; }
      .slider-wrap { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="page" id="page">

    <header class="header">
      <span class="logo">AABB</span>
      <div class="header-address">
        5F, 10, Wausanro21gil, Mapogu<br>
        Seoul, KR 05544
      </div>
    </header>

    <div class="center">

      <div class="hero-text" id="heroText">
        <span class="hero-line">Our website is</span>
        <span class="hero-line">now under construction.</span>
        <span class="hero-line">See you in May.</span>
      </div>

      <div class="slider-wrap" id="sliderWrap">
        <div class="slider-box">
          <div class="slides" id="slides">
            <div class="slide"><img src="https://drive.google.com/thumbnail?id=12n_S7KdXddqOY2Iy7Xt7XpEd-Bgnh1aF&sz=w1200" alt=""></div>
            <div class="slide"><img src="https://drive.google.com/thumbnail?id=1qy-uFJqQFVnFFzPA6WHaSvPn5rdyXUjM&sz=w1200" alt=""></div>
            <div class="slide"><img src="https://drive.google.com/thumbnail?id=1GUF68NgqS5a8ufg6P0Re4xFXJYrFyRSi&sz=w1200" alt=""></div>
            <div class="slide"><img src="https://drive.google.com/thumbnail?id=11JlNaHtGw9WVg92b1pvoqIBvKB9mbsSw&sz=w1200" alt=""></div>
            <div class="slide"><img src="https://drive.google.com/thumbnail?id=1nljVHHXPw1AhYK2bkqqyD_O362d-w9V1&sz=w1200" alt=""></div>
            <div class="slide"><img src="https://drive.google.com/thumbnail?id=1nQk5bLKtc0Rh3sBKXxIFRDlxOUqq4OJU&sz=w1200" alt=""></div>
            <div class="slide"><img src="https://drive.google.com/thumbnail?id=17yjATAQu_Atjaf-eKDUCdVHkSVPVOfad&sz=w1200" alt=""></div>
          </div>
          <button class="arrow arrow-prev" id="prev">&#8592;</button>
          <button class="arrow arrow-next" id="next">&#8594;</button>
        </div>
        <div class="slider-dots" id="sliderDots"></div>
      </div>

    </div>

    <footer class="footer">
      <div class="meta-item">
        <span class="meta-label">Instagram</span>
        <span class="meta-value"><a href="https://instagram.com/aabb.inc" target="_blank">@aabb.inc</a></span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Email</span>
        <span class="meta-value"><a href="mailto:aabb@aabb.kr">aabb@aabb.kr</a></span>
      </div>
    </footer>

  </div>

  <script>
    const page       = document.getElementById('page');
    const heroText   = document.getElementById('heroText');
    const sliderWrap = document.getElementById('sliderWrap');
    const slidesEl   = document.getElementById('slides');
    const dotsEl     = document.getElementById('sliderDots');
    const total      = 7;
    let current      = 0;
    let hovered      = false;

    // Build dots
    for (let i = 0; i < total; i++) {
      const d = document.createElement('div');
      d.className = 'sdot' + (i === 0 ? ' active' : '');
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    }
    const dots = document.querySelectorAll('.sdot');

    function goTo(idx) {
      current = (idx + total) % total;
      slidesEl.style.transform = `translateX(-${current * 100}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i === current));
    }

    document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('next').addEventListener('click', () => goTo(current + 1));

    // Keyboard left/right when hovered
    document.addEventListener('keydown', (e) => {
      if (!hovered) return;
      if (e.key === 'ArrowLeft') goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });

    // Hover: invert + show slider
    heroText.addEventListener('mouseenter', () => {
      hovered = true;
      page.classList.add('inverted');
      sliderWrap.classList.add('visible');
    });

    heroText.addEventListener('mouseleave', (e) => {
      // keep open if cursor moves to slider
      if (sliderWrap.contains(e.relatedTarget)) return;
      hide();
    });

    sliderWrap.addEventListener('mouseleave', (e) => {
      if (heroText.contains(e.relatedTarget)) return;
      hide();
    });

    function hide() {
      hovered = false;
      page.classList.remove('inverted');
      sliderWrap.classList.remove('visible');
    }
  </script>

</body>
</html>
