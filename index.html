<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AABB</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #f7f6f3;
      --black: #0e0e0e;
      --mid: #a0a09a;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--white);
      color: var(--black);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 32px 40px;
      transition: background 0.5s ease;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      transition: color 0.5s ease;
    }

    .logo {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--black);
      transition: color 0.5s ease;
    }

    .header-address {
      font-size: 11px;
      letter-spacing: 0.02em;
      color: var(--black);
      text-align: right;
      line-height: 1.7;
      transition: color 0.5s ease;
    }

    /* ── CENTER TEXT ── */
    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
    }

    .hero-text {
      cursor: default;
      text-align: center;
    }

    .hero-line {
      display: block;
      font-size: clamp(36px, 6vw, 88px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--black);
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: color 0.5s ease;
    }

    .hero-line:nth-child(1) { animation-delay: 0.1s; }
    .hero-line:nth-child(2) { animation-delay: 0.22s; }
    .hero-line:nth-child(3) { animation-delay: 0.34s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* hover invert */
    .hero-text:hover .hero-line { color: var(--white); }
    .page:has(.hero-text:hover) { background: var(--black); }
    .page:has(.hero-text:hover) .logo { color: var(--white); }
    .page:has(.hero-text:hover) .header-address { color: var(--white); }
    .page:has(.hero-text:hover) .meta-label { color: rgba(255,255,255,0.4); }
    .page:has(.hero-text:hover) .meta-value { color: var(--white); }
    .page:has(.hero-text:hover) .meta-value a { color: var(--white); border-bottom-color: var(--white); }

    /* ── FOOTER ── */
    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 32px;
      opacity: 0;
      animation: fadeUp 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .meta-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      transition: color 0.5s ease;
    }

    .meta-value {
      font-size: 13px;
      color: var(--black);
      transition: color 0.5s ease;
    }

    .meta-value a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      padding-bottom: 1px;
      transition: opacity 0.2s;
    }
    .meta-value a:hover { opacity: 0.5; }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .page { padding: 24px; }

      .header-address { display: none; }

      .footer {
        justify-content: flex-start;
        gap: 24px;
      }

      .meta-item { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <span class="logo">AABB</span>
      <div class="header-address">
        5F, 10, Wausanro21gil, Mapogu<br>
        Seoul, KR 05544
      </div>
    </header>

    <div class="center">
      <div class="hero-text">
        <span class="hero-line">Our website is</span>
        <span class="hero-line">now under construction.</span>
        <span class="hero-line">See you in May.</span>
      </div>
    </div>

    <footer class="footer">
      <div class="meta-item">
        <span class="meta-label">Instagram</span>
        <span class="meta-value"><a href="https://instagram.com/aabb.inc" target="_blank">@aabb.inc</a></span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Email</span>
        <span class="meta-value"><a href="mailto:aabb@aabb.kr">aabb@aabb.kr</a></span>
      </div>
    </footer>

  </div>
</body>
</html>
