<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --ink: #111111;
      --mid: #555555;
      --faint: #aaaaaa;
      --rule: #e0e0e0;
    }

    html { font-size: 13px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', 'Courier New', monospace;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 48px;
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .site-title { font-size: 0.92rem; font-weight: 400; letter-spacing: 0.04em; text-transform: uppercase; }
    .site-title em { font-style: italic; font-weight: 300; color: var(--mid); text-transform: lowercase; }

    nav { display: flex; gap: 2rem; font-size: 0.8rem; }
    nav a { color: var(--faint); text-decoration: none; transition: color 0.15s; letter-spacing: 0.03em; }
    nav a:hover, nav a.active { color: var(--ink); }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 38px;
      border-bottom: 1px solid var(--rule);
    }

    .count { font-size: 0.74rem; color: var(--faint); letter-spacing: 0.05em; min-width: 70px; }
    .filters { display: flex; }

    .filter-btn {
      background: none;
      border: none;
      border-right: 1px solid var(--rule);
      color: var(--faint);
      font-family: 'DM Mono', monospace;
      font-size: 0.74rem;
      letter-spacing: 0.04em;
      padding: 0 1rem;
      height: 38px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:first-child { border-left: 1px solid var(--rule); }
    .filter-btn:hover { color: var(--ink); }
    .filter-btn.active { color: var(--bg); background: var(--ink); }

    #search {
      background: none;
      border: none;
      border-bottom: 1px solid var(--rule);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-size: 0.74rem;
      padding: 0.2rem 0.3rem;
      width: 150px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search::placeholder { color: var(--faint); }
    #search:focus { border-color: var(--ink); }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-left: 1px solid var(--rule);
    }
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 700px)  { .grid { grid-template-columns: repeat(2, 1fr); } }

    .card {
      border-right: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .card-thumb {
      position: relative;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: #111;
      flex-shrink: 0;
    }

    .card-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8%;
      display: block;
      transition: transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
    }

    .no-image {
      position: absolute;
      inset: 0;
      background: #111;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.4rem;
      text-align: center;
      opacity: 0;
      transition: opacity 0.22s ease;
      z-index: 1;
    }

    .card:hover .card-overlay { opacity: 1; }
    .card:hover .card-thumb img { transform: scale(1.04); }

    .overlay-title {
      color: #fff;
      font-size: 0.8rem;
      line-height: 1.55;
      margin-bottom: 0.55rem;
    }

    .overlay-author {
      color: rgba(255,255,255,0.5);
      font-size: 0.7rem;
      font-style: italic;
    }

    .card-info {
      padding: 0.7rem 0.85rem 0.8rem;
      border-top: 1px solid var(--rule);
    }

    .info-author {
      font-size: 0.68rem;
      color: var(--faint);
      margin-bottom: 0.18rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .info-title {
      font-size: 0.76rem;
      color: var(--ink);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .info-year {
      font-size: 0.64rem;
      color: var(--faint);
      margin-top: 0.28rem;
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg);
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 220px 1fr;
      border: 1px solid var(--rule);
      transform: translateY(10px);
      transition: transform 0.22s;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }

    .modal-cover {
      background: #111;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-cover img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8%;
      display: block;
    }

    .modal-body {
      padding: 1.8rem;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--rule);
    }

    .modal-id { font-size: 0.66rem; color: var(--faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.9rem; }
    .modal-title { font-size: 0.95rem; font-weight: 400; line-height: 1.45; margin-bottom: 0.15rem; }
    .modal-title-sub { font-size: 0.78rem; font-style: italic; color: var(--mid); margin-bottom: 1.4rem; }

    .modal-meta {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 0.4rem 0.7rem;
      font-size: 0.72rem;
      margin-bottom: 1.4rem;
    }
    .meta-label { color: var(--faint); letter-spacing: 0.05em; }
    .meta-value { color: var(--ink); }

    .modal-desc {
      font-size: 0.72rem;
      line-height: 1.9;
      color: var(--mid);
      border-top: 1px solid var(--rule);
      padding-top: 1.1rem;
    }

    .modal-close {
      position: absolute;
      top: 0.85rem;
      right: 0.85rem;
      background: var(--bg);
      border: 1px solid var(--rule);
      color: var(--mid);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 0.22rem 0.55rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .modal-close:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 8rem 2rem;
      font-size: 0.76rem;
      color: var(--faint);
      letter-spacing: 0.06em;
    }

    @media (max-width: 580px) {
      .modal { grid-template-columns: 1fr; }
      .modal-cover { min-height: 200px; }
      .modal-body { border-left: none; border-top: 1px solid var(--rule); }
      header { padding: 0 1.2rem; }
      .toolbar { padding: 0 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="site-title">OS <em>library</em></div>
  <nav>
    <a href="#" class="active">archive</a>
    <a href="#">news</a>
    <a href="#">about</a>
    <a href="#">contact</a>
  </nav>
</header>

<div class="toolbar">
  <span class="count" id="count">—</span>
  <div class="filters">
    <button class="filter-btn active" data-year="all">all</button>
    <button class="filter-btn" data-year="2026">2026</button>
    <button class="filter-btn" data-year="2025">2025</button>
    <button class="filter-btn" data-year="2024">2024</button>
    <button class="filter-btn" data-year="2023">2023</button>
  </div>
  <input type="search" id="search" placeholder="search" autocomplete="off" />
</div>

<main class="grid" id="grid">
  <div class="state-msg">loading…</div>
</main>

<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-cover" id="modal-cover"><div class="no-image"></div></div>
    <div class="modal-body">
      <div class="modal-id" id="modal-id"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-title-sub" id="modal-title-sub"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-desc" id="modal-desc"></div>
    </div>
  </div>
  <button class="modal-close" id="modal-close">ESC</button>
</div>

<script>
  const SHEET_ID  = '1hNgNNsGC0hVxicmm_B5QUksjlicXtD8eAFIl3VIAScg';
  const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=996701484`;

  let allBooks   = [];
  let activeYear = 'all';
  let query      = '';

  // 책 ID로 이미지 경로 생성: images/{ID}_00.png
  function imgUrl(id) {
    return `${id}_00.png`;
  }

  async function init() {
    try {
      const res = await fetch(SHEET_URL);
      if (!res.ok) throw new Error();
      allBooks = parseCSV(await res.text());
      render();
    } catch {
      document.getElementById('grid').innerHTML =
        '<div class="state-msg">스프레드시트를 불러오지 못했습니다.</div>';
    }
  }

  function parseCSV(csv) {
    return csv.split('\n').slice(1).map(line => {
      const c = splitLine(line);
      if (!c[0] || !c[0].trim()) return null;
      return {
        id:       c[0].trim(),
        titleKo:  c[1] || '',
        titleEn:  c[2] || '',
        authorKo: c[3] || '',
        authorEn: c[4] || '',
        pubKo:    c[5] || '',
        pubEn:    c[6] || '',
        year:     c[7] || '',
        pages:    c[8] || '',
        size:     c[9] || '',
        print:    c[10] || '',
        binding:  c[11] || '',
        desc:     c[12] || '',
        isbn:     c[13] || '',
      };
    }).filter(Boolean);
  }

  function splitLine(line) {
    const res = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
      else if (ch === ',' && !inQ) { res.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    res.push(cur.trim());
    return res;
  }

  function filtered() {
    return allBooks.filter(b => {
      const yOk = activeYear === 'all' || b.year === activeYear;
      const q   = query.toLowerCase();
      const qOk = !q || [b.titleKo, b.titleEn, b.authorKo, b.authorEn, b.pubKo, b.pubEn]
        .some(s => s.toLowerCase().includes(q));
      return yOk && qOk;
    });
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const books = filtered();
    document.getElementById('count').textContent = books.length + ' titles';
    const grid = document.getElementById('grid');

    if (!books.length) {
      grid.innerHTML = '<div class="state-msg">no results</div>';
      return;
    }

    grid.innerHTML = books.map(b => {
      const main   = (b.titleKo && b.titleKo !== '-') ? b.titleKo : b.titleEn;
      const sub    = (b.titleKo && b.titleKo !== '-') ? b.titleEn : '';
      const author = b.authorKo || b.authorEn;
      const img    = imgUrl(b.id);

      return `
        <div class="card" data-index="${allBooks.indexOf(b)}">
          <div class="card-thumb">
            <img src="${img}" alt="${esc(main)}"
              onerror="this.style.display='none'">
            <div class="card-overlay">
              <div class="overlay-title">${esc(main)}${sub ? '<br><span style="opacity:.5;font-style:italic">' + esc(sub) + '</span>' : ''}</div>
              <div class="overlay-author">${esc(author)}</div>
            </div>
          </div>
          <div class="card-info">
            <div class="info-author">${esc(author)}</div>
            <div class="info-title">${esc(main)}</div>
            ${b.year ? `<div class="info-year">${esc(b.year)}</div>` : ''}
          </div>
        </div>`;
    }).join('');

    grid.querySelectorAll('.card').forEach(c =>
      c.addEventListener('click', () => openModal(+c.dataset.index))
    );
  }

  function openModal(i) {
    const b      = allBooks[i];
    const main   = (b.titleKo && b.titleKo !== '-') ? b.titleKo : b.titleEn;
    const sub    = (b.titleKo && b.titleKo !== '-') ? b.titleEn : '';
    const img    = imgUrl(b.id);

    document.getElementById('modal-id').textContent        = b.id;
    document.getElementById('modal-title').textContent     = main;
    document.getElementById('modal-title-sub').textContent = sub;
    document.getElementById('modal-desc').textContent      = b.desc;

    document.getElementById('modal-cover').innerHTML =
      `<img src="${img}" alt="${esc(main)}"
        style="width:100%;height:100%;object-fit:contain;padding:8%;display:block"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'no-image',style:'width:100%;height:100%'}))">`;

    const rows = [
      ['author',    b.authorKo || b.authorEn],
      ['publisher', b.pubKo || b.pubEn],
      ['year',      b.year],
      ['pages',     b.pages ? b.pages + 'p' : ''],
      ['size',      b.size],
      ['print',     b.print],
      ['binding',   b.binding],
      ['isbn',      b.isbn && b.isbn !== '-' ? b.isbn : ''],
    ].filter(([, v]) => v);

    document.getElementById('modal-meta').innerHTML = rows
      .map(([l, v]) => `<span class="meta-label">${esc(l)}</span><span class="meta-value">${esc(v)}</span>`)
      .join('');

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.querySelectorAll('.filter-btn').forEach(btn =>
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeYear = btn.dataset.year;
      render();
    })
  );

  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value;
    render();
  });

  init();
</script>
</body>
</html>
