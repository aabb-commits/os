<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS — About</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Funnel+Sans:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #000000; --ink: #ffffff; --mid: #888888; --faint: #555555; --rule: #333333; }
    html { font-size: 15px; }
    body { background: var(--bg); color: var(--ink); font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    header {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 0 2.5rem; height: 70px;
      border-bottom: 1px solid var(--rule);
      position: sticky; top: 0; background: var(--bg); z-index: 100;
    }
    .nav-left { display: flex; gap: 2rem; align-items: center; }
    .nav-right { display: flex; gap: 2rem; align-items: center; justify-content: flex-end; }
    nav a {
      font-family: 'Anton', sans-serif; color: var(--faint); text-decoration: none;
      transition: color 0.15s; letter-spacing: 0.08em; text-transform: uppercase;
      font-size: clamp(1.1rem, 2.2vw, 2.1rem); line-height: 1;
    }
    nav a:hover, nav a.active { color: var(--ink); }
    .site-title {
      font-family: 'Funnel Sans', sans-serif;
      font-size: clamp(1.8rem, 3.6vw, 3.2rem); font-weight: 700;
      letter-spacing: 0.01em; text-align: center; line-height: 1;
      color: var(--ink); text-decoration: none; display: block;
    }

    /* MAIN LAYOUT */
    .about-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
    }

    /* 왼쪽 */
    .about-left {
      padding: 4rem 3rem 4rem 2.5rem;
      border-right: 1px solid var(--rule);
      display: flex; flex-direction: column; gap: 0;
    }
    .about-desc-kr {
      font-size: clamp(0.92rem, 1.3vw, 1.05rem);
      line-height: 1.9; color: var(--ink); font-weight: 400;
    }
    .about-desc-en {
      font-size: clamp(0.92rem, 1.3vw, 1.05rem);
      line-height: 1.9; color: var(--mid); font-weight: 400;
    }
    .contact-block { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 2.5rem; }
    .contact-label {
      font-size: 1rem; color: var(--faint);
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.4rem;
    }
    .contact-row { display: flex; gap: 1.2rem; align-items: baseline; margin-bottom: 0.5rem; }
    .contact-key { font-size: 0.72rem; color: var(--faint); letter-spacing: 0.06em; text-transform: uppercase; min-width: 1.6rem; }
    .contact-val { font-size: 0.88rem; color: var(--ink); }
    .contact-val a { color: var(--ink); text-decoration: none; }
    .contact-val a:hover { text-decoration: underline; }

    /* 오른쪽 */
    .about-right {
      padding: 4rem 2.5rem 4rem 3rem;
      display: flex; flex-direction: column;
    }
    .submit-top { display: flex; flex-direction: column; gap: 1rem; }
    .about-section-label {
      font-size: 1rem; color: var(--faint);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 1.2rem;
    }
    .submit-label {
      font-size: 1rem; color: var(--faint);
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .submit-desc {
      font-size: clamp(0.88rem, 1.3vw, 1rem);
      line-height: 1.9; color: var(--mid);
    }
    .submit-desc-en {
      margin-top: 1rem;
      color: var(--mid);
      font-style: normal;
    }
    .submit-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 1rem 2rem;
      background: var(--ink); color: var(--bg);
      font-family: 'Anton', sans-serif;
      font-size: clamp(1rem, 1.8vw, 1.4rem);
      letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; text-align: center;
      transition: background 0.15s, color 0.15s;
      border: 1px solid var(--ink);
      align-self: flex-start;
      margin-top: 3rem;
    }
    .submit-btn:hover { background: transparent; color: var(--ink); border-color: var(--ink); }

    /* CONTACT MODAL */
    .contact-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .contact-modal-backdrop.open { opacity: 1; pointer-events: all; }
    .contact-modal {
      background: var(--bg);
      border: 1px solid var(--rule);
      width: 320px;
      transform: translateY(8px);
      transition: transform 0.2s;
    }
    .contact-modal-backdrop.open .contact-modal { transform: translateY(0); }
    .contact-modal-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 1.4rem;
      border-bottom: 1px solid var(--rule);
      text-decoration: none;
      color: var(--ink);
      font-size: 0.88rem;
      letter-spacing: 0.02em;
      transition: background 0.12s;
      cursor: pointer;
    }
    .contact-modal-row:last-child { border-bottom: none; }
    .contact-modal-row:hover { background: var(--ink); color: var(--bg); }
    .contact-modal-arrow { font-size: 0.8rem; color: var(--faint); }
    .contact-modal-row:hover .contact-modal-arrow { color: var(--bg); }

    /* FOOTER */
    footer { background: #111111; color: var(--ink); padding: 2.5rem 2rem; text-align: center; font-size: 0.82rem; line-height: 2; letter-spacing: 0.03em; }
    footer strong { display: block; font-size: 0.95rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
    footer a { color: rgba(255,255,255,0.5); text-decoration: none; }
    footer a:hover { color: #fff; }
    footer .footer-meta { color: var(--faint); }

    /* 반응형 */
    @media (max-width: 700px) {
      header { grid-template-columns: 1fr; height: auto; padding: 0.7rem 1.2rem; gap: 0.4rem; justify-items: center; }
      .nav-left { order: 2; justify-content: center; flex-wrap: nowrap; gap: 1rem; }
      .site-title { order: 1; }
      .nav-right { order: 2; justify-content: center; flex-wrap: nowrap; gap: 1rem; }
      .nav-left a, .nav-right a { font-size: clamp(0.65rem, 2.5vw, 0.9rem); letter-spacing: 0.04em; }
      .about-wrap { grid-template-columns: 1fr; }
      .about-left { border-right: none; border-bottom: 1px solid var(--rule); padding: 2.5rem 1.5rem; }
      .about-right { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>
