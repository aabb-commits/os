<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS — About</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Funnel+Sans:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #000000; --ink: #ffffff; --mid: #888888; --faint: #555555; --rule: #333333; }
    html { font-size: 15px; }
    body { background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 2.5rem; height: 70px; border-bottom: 1px solid var(--rule); position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .nav-left { display: flex; gap: 2rem; align-items: center; }
    .nav-right { display: flex; gap: 2rem; align-items: center; justify-content: flex-end; }
    nav a { font-family: 'Anton', sans-serif; color: var(--faint); text-decoration: none; transition: color 0.15s; letter-spacing: 0.08em; text-transform: uppercase; font-size: clamp(1.1rem, 2.2vw, 2.1rem); line-height: 1; }
    nav a:hover, nav a.active { color: var(--ink); }
    .site-title { font-family: 'Funnel Sans', sans-serif; font-size: clamp(1.8rem, 3.6vw, 3.2rem); font-weight: 700; letter-spacing: 0.01em; text-align: center; line-height: 1; color: var(--ink); text-decoration: none; display: block; }

    .about-wrap { display: grid; grid-template-columns: 1fr 1fr; flex: 1; border-top: 1px solid var(--rule); }
    .about-left { padding: 4rem 3rem 4rem 2.5rem; border-right: 1px solid var(--rule); display: flex; flex-direction: column; gap: 0; }
    .about-right { padding: 4rem 2.5rem 4rem 3rem; display: flex; flex-direction: column; }

    .section-label { font-size: 1rem; color: var(--faint); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 1.2rem; }
    .about-desc-kr { font-size: clamp(0.88rem, 1.3vw, 1rem); line-height: 1.9; color: var(--ink); }
    .about-desc-en { font-size: clamp(0.88rem, 1.3vw, 1rem); line-height: 1.9; color: var(--mid); margin-top: 1rem; }

    .contact-block { display: flex; flex-direction: column; margin-top: 2.5rem; }
    .contact-row { display: flex; gap: 1.2rem; align-items: baseline; margin-bottom: 0.5rem; }
    .contact-key { font-size: 0.72rem; color: var(--faint); letter-spacing: 0.06em; text-transform: uppercase; min-width: 1.6rem; }
    .contact-val { font-size: 0.88rem; color: var(--ink); }
    .contact-val a { color: var(--ink); text-decoration: none; }
    .contact-val a:hover { text-decoration: underline; }

    .submit-top { display: flex; flex-direction: column; gap: 1rem; }
    .submit-desc { font-size: clamp(0.88rem, 1.3vw, 1rem); line-height: 1.9; color: var(--mid); }
    .submit-desc-en { margin-top: 1rem; color: var(--mid); }
    .submit-btn { display: inline-block; margin-top: 2rem; padding: 1rem 2rem; background: var(--ink); color: var(--bg); font-family: 'Anton', sans-serif; font-size: clamp(1rem, 1.8vw, 1.4rem); letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; border: 1px solid var(--rule); transition: background 0.15s, color 0.15s; align-self: flex-start; }
    .submit-btn:hover { background: transparent; color: var(--ink); }

    .contact-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .contact-modal-backdrop.open { opacity: 1; pointer-events: all; }
    .contact-modal { background: var(--bg); border: 1px solid var(--rule); width: 320px; transform: translateY(8px); transition: transform 0.2s; }
    .contact-modal-backdrop.open .contact-modal { transform: translateY(0); }
    .contact-modal-row { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 1.4rem; border-bottom: 1px solid var(--rule); text-decoration: none; color: var(--ink); font-size: 0.88rem; letter-spacing: 0.02em; transition: background 0.12s; }
    .contact-modal-row:last-child { border-bottom: none; }
    .contact-modal-row:hover { background: var(--ink); color: var(--bg); }
    .contact-modal-arrow { font-size: 0.8rem; color: var(--faint); }
    .contact-modal-row:hover .contact-modal-arrow { color: var(--bg); }

    footer { background: #111; color: var(--ink); padding: 2.5rem 2rem; text-align: center; font-size: 0.82rem; line-height: 2; letter-spacing: 0.03em; }
    footer strong { display: block; font-size: 0.95rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
    footer a { color: rgba(255,255,255,0.5); text-decoration: none; }
    footer a:hover { color: #fff; }
    footer .footer-meta { color: var(--faint); }

    @media (max-width: 700px) {
      header { grid-template-columns: 1fr; height: auto; padding: 0.7rem 1.2rem; gap: 0.4rem; justify-items: center; }
      .nav-left { order: 2; justify-content: center; gap: 1rem; }
      .site-title { order: 1; }
      .nav-right { order: 2; justify-content: center; gap: 1rem; }
      .nav-left a, .nav-right a { font-size: clamp(0.65rem, 2.5vw, 0.9rem); }
      .about-wrap { grid-template-columns: 1fr; }
      .about-left { border-right: none; border-bottom: 1px solid var(--rule); padding: 2.5rem 1.5rem; }
      .about-right { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <nav class="nav-left">
    <a href="index.html">News</a>
    <a href="index.html">Seminar</a>
    <a href="index.html">Article</a>
  </nav>
  <a href="index.html" class="site-title">OS</a>
  <nav class="nav-right">
    <a href="about.html" class="active">About</a>
    <a href="#" id="contact-link">Contact</a>
  </nav>
</header>

<div class="about-wrap" id="about-wrap"></div>

<div class="contact-modal-backdrop" id="contact-modal">
  <div class="contact-modal">
    <a class="contact-modal-row" href="https://maps.app.goo.gl/zo92YtDpSaYs7Nhz7" target="_blank">Google Maps <span class="contact-modal-arrow">&#8599;</span></a>
    <a class="contact-modal-row" href="https://naver.me/GoDhhbsS" target="_blank">Naver Map <span class="contact-modal-arrow">&#8599;</span></a>
    <a class="contact-modal-row" href="mailto:aabb&#64;aabb.kr">aabb&#64;aabb.kr <span class="contact-modal-arrow">&#8599;</span></a>
  </div>
</div>

<footer>
  <strong>OS</strong>
  <span class="footer-meta">5F, 10, Wausanro21gil, Mapogu, Seoul, KR</span><br>
  Contact&#160;&#160;aabb&#64;aabb.kr<br>
  Instagram&#160;&#160;<a href="https://instagram.com/aabb.os.library" target="_blank">&#64;aabb.os.library</a>
</footer>

<script>
(function(){
  var SID = '1hNgNNsGC0hVxicmm_B5QUksjlicXtD8eAFIl3VIAScg';
  var GID = '78065457';

  function splitLine(line){
    var res=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){res.push(cur.trim());cur='';}
      else cur+=c;
    }
    res.push(cur.trim());
    return res;
  }

  function parseKV(csv){
    var lines=csv.split('\n');
    var headers=splitLine(lines[0]);
    var vals=splitLine(lines[1]||'');
    var obj={};
    headers.forEach(function(h,i){ obj[h.trim()]=vals[i]||''; });
    return obj;
  }

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function render(d){
    var kr   = d['Desc_KR']       || '';
    var en   = d['Desc_EN']       || '';
    var email= d['email']         || '';
    var ig   = d['Instagram']     || '';
    var aKr  = d['Address_KR']    || '';
    var aEn  = d['Address_EN']    || '';
    var sKr  = d['Submission_KR'] || '';
    var sEn  = d['Submission_EN'] || '';

    var contactHTML='';
    if(email) contactHTML+='<div class="contact-row"><span class="contact-key">E</span><span class="contact-val"><a href="mailto:'+esc(email)+'">'+esc(email)+'</a></span></div>';
    if(ig)    contactHTML+='<div class="contact-row"><span class="contact-key">IG</span><span class="contact-val"><a href="https://instagram.com/'+esc(ig.replace('@',''))+'" target="_blank">'+esc(ig)+'</a></span></div>';
    if(aKr)   contactHTML+='<div class="contact-row"><span class="contact-key">A</span><span class="contact-val">'+esc(aKr)+'</span></div>';
    if(aEn)   contactHTML+='<div class="contact-row"><span class="contact-key"></span><span class="contact-val">'+esc(aEn)+'</span></div>';

    document.getElementById('about-wrap').innerHTML =
      '<div class="about-left">'
        +'<div class="section-label">OS</div>'
        +(kr?'<p class="about-desc-kr">'+esc(kr)+'</p>':'')
        +(en?'<p class="about-desc-en">'+esc(en)+'</p>':'')
        +(contactHTML?'<div class="contact-block"><div class="section-label" style="margin-top:2.5rem">Contact</div>'+contactHTML+'</div>':'')
      +'</div>'
      +'<div class="about-right">'
        +'<div class="submit-top">'
          +'<div class="section-label">OS Archive</div>'
          +(sKr?'<p class="submit-desc">'+esc(sKr)+'</p>':'')
          +(sEn?'<p class="submit-desc submit-desc-en">'+esc(sEn)+'</p>':'')
        +'</div>'
        +'<a class="submit-btn" href="https://forms.gle/gKWMpudBKSDzDNHj6" target="_blank">Submit Publication &#8599;</a>'
      +'</div>';
  }

  var fallback = {
    'Desc_KR': 'OS는 AABB가 운영하는 초소형 문화공간입니다. OS에서는 AABB가 주목하는 독립출판물을 누구나 방문하여 열람할 수 있으며, 일부 소장 도서는 온/오프라인으로 구매 가능합니다.',
    'Desc_EN': 'OS is the cultural space to share our interest in visual arts and independent publications.',
    'email': 'aabb@aabb.kr',
    'Instagram': '@aabb.os.library',
    'Address_KR': '서울시 마포구 와우산로21길 10, 5F',
    'Address_EN': '5F, 10, Wausanro21gil, Mapogu, Seoul, KR',
    'Submission_KR': 'OS 아카이브 입고를 원하시는 출판물이 있으시면 아래 링크를 통해 문의해주세요.',
    'Submission_EN': ''
  };

  var URL = 'https://docs.google.com/spreadsheets/d/'+SID+'/export?format=csv&gid='+GID;
  fetch(URL)
    .then(function(r){ if(!r.ok) throw 0; return r.text(); })
    .then(function(t){ render(parseKV(t)); })
    .catch(function(){ render(fallback); });

  var cLink=document.getElementById('contact-link');
  var cModal=document.getElementById('contact-modal');
  cLink.addEventListener('click',function(e){e.preventDefault();cModal.classList.add('open');});
  cModal.addEventListener('click',function(e){if(e.target===cModal) cModal.classList.remove('open');});
  document.addEventListener('keydown',function(e){if(e.key==='Escape') cModal.classList.remove('open');});
})();
</script>
</body>
</html>
